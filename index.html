<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Up Docs 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/index.css">
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <div class="brand">skill-up-docs // 2026</div>
      <div class="top-actions">
        <button class="btn" id="theme-toggle" type="button">Dark</button>
        <button class="btn" id="palette-toggle" type="button" title="Command Palette (Ctrl/Cmd+K)">Palette</button>
      </div>
    </div>

    <section class="hero">
      <h1>Learning Dashboard</h1>
      <p>UI-first roadmap workspace with progress, queue, tracking, and instant doc navigation.</p>
      <div class="metrics">
        <div class="metric"><div class="label">Active Tracks</div><div class="value" id="metric-tracks">0</div></div>
        <div class="metric"><div class="label">Total Docs</div><div class="value" id="metric-docs">0</div></div>
        <div class="metric"><div class="label">Current Streak</div><div class="value" id="metric-streak">0</div></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Continue Learning</h2>
      </div>
      <div class="cards" id="continue-grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Track Overview</h2>
        <div class="tiny" id="results-info">0 doc(s)</div>
      </div>
      <div class="filters">
        <input id="filter-search" class="input" type="text" placeholder="Search title / track / tags">
        <select id="filter-track" class="select"><option value="">All tracks</option></select>
        <select id="filter-status" class="select">
          <option value="">All status</option>
          <option value="todo">todo</option>
          <option value="in-progress">in-progress</option>
          <option value="done">done</option>
        </select>
        <select id="filter-difficulty" class="select">
          <option value="">All difficulty</option>
          <option value="easy">easy</option>
          <option value="medium">medium</option>
          <option value="hard">hard</option>
        </select>
        <select id="filter-tag" class="select"><option value="">All tags</option></select>
      </div>
      <div class="filters" style="margin-top:10px">
        <select id="filter-sort" class="select">
          <option value="newest">Newest generated</option>
          <option value="review">Next review due</option>
          <option value="shortest">Shortest estimate</option>
        </select>
      </div>
      <div class="cards" id="track-grid" style="margin-top:12px"></div>
    </section>

    <div class="row">
      <section class="section">
        <div class="section-head"><h2>Today Queue</h2></div>
        <div class="list" id="today-list"></div>
      </section>
      <section class="section">
        <div class="section-head"><h2>Recent Activity</h2></div>
        <div class="list" id="recent-list"></div>
      </section>
    </div>

    <div id="fatal-error" class="section hidden"></div>
  </main>

  <div class="cp-overlay" id="cp-overlay">
    <div class="cp-panel">
      <input id="cp-input" type="text" placeholder="Search docs (Ctrl/Cmd+K)">
      <div class="cp-results" id="cp-results"></div>
    </div>
  </div>

  <script src="roadmaps-data.js"></script>
  <script src="assets/index.js"></script>
</body>
</html>
